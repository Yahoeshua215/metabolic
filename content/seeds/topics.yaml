- slug: artificial-sweeteners
  title: Artificial Sweeteners
  summary: Where metabolic-health experts agree and differ on diet sweeteners, cravings, and transition use.
  tags: [glucose-control, cravings, insulin-resistance]
  evidence_level: mixed
  consensus: Non-sugar sweeteners are generally metabolically preferable to sugar, but they may maintain cravings or trigger overeating in some people.
  practical_takeaway: Use them as a transition tool if they help remove sugar, but avoid making sweet taste a constant habit.
  sections:
    overview: Artificial sweeteners sit between harm reduction and behavioral concern.
    why_it_matters: They can reduce sugar exposure, but taste-driven cravings may undermine long-term behavior change.
    consensus: Most experts agree they are not the same as sugar, and most also agree that individual response matters.
    debate: The main disagreement is whether they should be treated as acceptable substitutes or avoided to retrain taste preferences.
    recommendations: If cravings stay high, remove them for two weeks and reassess appetite, energy, and adherence.
  positions:
    - expert: jason-fung
      confidence: context_dependent
      stance_summary: Relatively permissive compared with sugar.
      stance_detail: Better than sugar, but not a license for unlimited sweetened products.
    - expert: sten-ekberg
      confidence: cautious
      stance_summary: More cautious because sweet taste may sustain cravings.
      stance_detail: Prefers moving away from sweet taste rather than replacing sugar one-for-one.
    - expert: ben-bikman
      confidence: context_dependent
      stance_summary: Context and insulin response matter.
      stance_detail: Distinguishes direct metabolic effects from behavioral effects.
  clips:
