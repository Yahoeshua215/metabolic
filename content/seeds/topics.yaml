- slug: coffee-during-fasting
  title: Coffee During Fasting
  summary: How black coffee, cream, sweeteners, and hunger signals fit into a fasting window.
  tags: [fasting, glucose-control, cravings]
  evidence_level: moderate
  consensus: Black coffee is generally compatible with a fasting window for most goals, while calories, cream, and sweeteners make the answer more context-dependent.
  practical_takeaway: If the goal is habit-building or insulin reduction, black coffee is usually acceptable. If the goal is a stricter fast, keep coffee plain and watch whether it triggers cravings.
  sections:
    overview: Coffee is one of the most common edge cases in fasting because it is not a meal, but it can affect appetite, sleep, and fasting adherence.
    why_it_matters: The practical issue is less about coffee itself and more about what is added to it and whether it changes hunger, cravings, or glucose response.
    consensus: Most experts are comfortable with plain coffee during fasting, especially for beginners using fasting as a metabolic-health habit.
    debate: Stricter voices treat cream, butter, or sweeteners as breaking the fast, while pragmatic voices allow small additions if adherence improves.
    recommendations: Start with black coffee or unsweetened tea. If adding cream keeps the habit sustainable, treat it as a transition tool rather than a pure fast.
  positions:
    - expert: jason-fung
      confidence: context_dependent
      stance_summary: Relatively pragmatic if coffee helps adherence.
      stance_detail: Plain coffee is typically acceptable; additives should be judged by fasting goal and insulin response.
    - expert: sten-ekberg
      confidence: cautious
      stance_summary: More cautious about additions and sweeteners.
      stance_detail: Keeps the fasting window cleaner and avoids taste cues that can trigger cravings.
  clips:
