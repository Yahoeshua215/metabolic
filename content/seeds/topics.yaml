- slug: berberine
  title: Berberine
  summary: What to know about berberine as a supplement for glucose control and insulin sensitivity.
  tags: [supplements, glucose-control, insulin-resistance]
  evidence_level: moderate
  consensus: Berberine has promising evidence for glucose and lipid markers, but it should not replace food, movement, sleep, or medical care.
  practical_takeaway: Consider only after basics are in place, and discuss medication interactions with a clinician.
  sections:
    overview: Berberine is a plant-derived compound often discussed for glucose and lipid metabolism.
